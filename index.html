<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Pressure Points</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js"></script>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; }
    #container { position:relative; width:100vw; height:100vh; }
    video, canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
    canvas { pointer-events:none; }
    #info {
      position:absolute; bottom:10px; left:0; right:0; text-align:center;
      color:white; font-size:18px; background:rgba(0,0,0,0.6); padding:10px;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
  <div id="info">Point your face to the camera</div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let faceLandmarker;
    let currentSymptom = "";

    async function initFaceMesh() {
      const vision = await vision_bundle.createVision();
      faceLandmarker = await vision.FaceLandmarker.createFromOptions(vision, {
        baseOptions: { 
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" 
        },
        runningMode: "VIDEO",
        numFaces: 1
      });
      startCamera();
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user", width: 640, height: 480 } 
      })
      .then(stream => {
        video.srcObject = stream;
        video.addEventListener('loadeddata', () => requestAnimationFrame(predict));
      })
      .catch(err => console.error("Camera error:", err));
    }

    function predict() {
      if (!faceLandmarker || !video.videoWidth) {
        requestAnimationFrame(predict);
        return;
      }

      const results = faceLandmarker.detectForVideo(video, performance.now());
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (results.faceLandmarks) {
        for (const landmarks of results.faceLandmarks) {
          // Draw light face mesh
          ctx.fillStyle = "rgba(255,255,255,0.4)";
          for (let i = 0; i < landmarks.length; i++) {
            const x = landmarks[i].x * canvas.width;
            const y = landmarks[i].y * canvas.height;
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, 2 * Math.PI);
            ctx.fill();
          }

          // Draw big red dots for selected symptom
          drawSymptomPoints(landmarks);
        }
      }
      ctx.restore();
      requestAnimationFrame(predict);
    }

    function drawSymptomPoints(landmarks) {
      ctx.fillStyle = "#FF0000";
      ctx.strokeStyle = "#FF0000";
      ctx.lineWidth = 4;

      if (currentSymptom.includes("Headache") || currentSymptom.includes("Migraine")) {
        // Yintang + Taiyang
        drawBigPoint(landmarks, 168);   // Yintang (between eyebrows)
        drawBigPoint(landmarks, 33);    // Left temple
        drawBigPoint(landmarks, 263);   // Right temple
      } 
      else if (currentSymptom.includes("Sinus")) {
        // LI20 + ST2
        drawBigPoint(landmarks, 6);     // Near nose
        drawBigPoint(landmarks, 197);   // Left cheek below eye
        drawBigPoint(landmarks, 411);   // Right cheek below eye
      } 
      else if (currentSymptom.includes("Eye") || currentSymptom.includes("Tired Eyes")) {
        // GB14 + Taiyang + Jingming
        drawBigPoint(landmarks, 151);   // Above eyebrows (GB14 area)
        drawBigPoint(landmarks, 33);    // Left Taiyang
        drawBigPoint(landmarks, 263);   // Right Taiyang
        drawBigPoint(landmarks, 33);    // Inner eye area approximation
      } 
      else if (currentSymptom.includes("Jaw") || currentSymptom.includes("TMJ")) {
        // ST6 + ST7 (jaw area)
        drawBigPoint(landmarks, 78);    // Left jaw
        drawBigPoint(landmarks, 308);   // Right jaw
        drawBigPoint(landmarks, 61);    // Near ear/jaw
      } 
      else if (currentSymptom.includes("Stress") || currentSymptom.includes("Facial Stress")) {
        // Yintang + Taiyang + GB20 area
        drawBigPoint(landmarks, 168);
        drawBigPoint(landmarks, 33);
        drawBigPoint(landmarks, 263);
      } 
      else if (currentSymptom.includes("Relaxation")) {
        // General relaxation points
        drawBigPoint(landmarks, 168);   // Yintang
        drawBigPoint(landmarks, 33);
        drawBigPoint(landmarks, 263);
        drawBigPoint(landmarks, 151);   // Forehead
      }
    }

    function drawBigPoint(landmarks, index) {
      if (index < landmarks.length) {
        const x = landmarks[index].x * canvas.width;
        const y = landmarks[index].y * canvas.height;
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();
      }
    }

    // Function called from App Inventor
    window.setSymptom = function(symptom) {
      currentSymptom = symptom || "";
      document.getElementById("info").innerText = "Showing points for: " + currentSymptom;
    };

    // Start the app
    initFaceMesh();
  </script>
</body>
</html>
